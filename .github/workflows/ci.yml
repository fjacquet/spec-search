name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - name: Lint root Python
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .
      - name: Lint MCP server Python
        working-directory: mcp_server
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .

  lint-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Lint web app
        working-directory: web
        run: |
          npm ci
          npx biome check .

  test-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - name: Run pipeline tests
        run: |
          uv sync --group dev
          uv run pytest tests/ -v

  test-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - name: Run MCP server tests
        working-directory: mcp_server
        run: |
          uv sync --group dev
          uv run pytest tests/ -v

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Run web tests with coverage
        working-directory: web
        run: |
          npm ci
          npx vitest run --coverage

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Audit Python (root)
        run: |
          uv sync --group dev
          uv run pip-audit
      - name: Audit Python (MCP server)
        working-directory: mcp_server
        run: |
          uv sync --group dev
          uv run pip-audit
      - name: Audit Node
        working-directory: web
        run: |
          npm ci
          npm audit --audit-level=moderate

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - name: Generate JS SBOM
        working-directory: web
        run: |
          npm ci
          npx @cyclonedx/cyclonedx-npm --output-file ../sbom-web.cdx.json
      - name: Generate Python SBOM
        working-directory: mcp_server
        run: |
          uv sync
          uv run cyclonedx-py environment --output ../sbom-mcp.cdx.json
      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-web.cdx.json
            sbom-mcp.cdx.json

  build:
    needs: [lint-python, lint-js, test-pipeline, test-mcp, test-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Convert CSV to JSON
        run: python scripts/convert_csv.py
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web app
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
