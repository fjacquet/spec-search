name: Publish MCP to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7

      - name: Bundle CSV data
        run: |
          mkdir -p mcp_server/src/spec_search_mcp/data
          gzip -k -9 -c datas/cpu2017-results.csv > mcp_server/src/spec_search_mcp/data/cpu2017-results.csv.gz

      - name: Build package
        working-directory: mcp_server
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: mcp_server/dist/
