version: 2
updates:
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    groups:
      all-npm:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /mcp_server
    schedule:
      interval: weekly
    groups:
      all-pip:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      all-actions:
        patterns: ["*"]
