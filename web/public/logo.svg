<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d6efd"/>
      <stop offset="100%" stop-color="#0b5ed7"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- CPU chip body -->
  <rect x="136" y="136" width="240" height="240" rx="24" fill="#ffffff" opacity="0.95"/>
  <!-- CPU die (inner square) -->
  <rect x="186" y="186" width="140" height="140" rx="8" fill="#0d6efd" opacity="0.15"/>
  <!-- SPEC text -->
  <text x="256" y="275" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="56" font-weight="800" fill="#0d6efd" letter-spacing="2">SPEC</text>
  <!-- Search magnifier icon (bottom right of die) -->
  <circle cx="300" cy="300" r="22" fill="none" stroke="#0b5ed7" stroke-width="6"/>
  <line x1="316" y1="316" x2="336" y2="336" stroke="#0b5ed7" stroke-width="6" stroke-linecap="round"/>
  <!-- CPU pins - top -->
  <rect x="180" y="112" width="16" height="32" rx="4" fill="#ffffff" opacity="0.9"/>
  <rect x="212" y="112" width="16" height="32" rx="4" fill="#ffffff" opacity="0.9"/>
  <rect x="248" y="112" width="16" height="32" rx="4" fill="#ffffff" opacity="0.9"/>
  <rect x="284" y="112" width="16" height="32" rx="4" fill="#ffffff" opacity="0.9"/>
  <rect x="316" y="112" width="16" height="32" rx="4" fill="#ffffff" opacity="0.9"/>
  <!-- CPU pins - bottom -->
  <rect x="180" y="368" width="16" height="32" rx="4" fill="#ffffff" opacity="0.9"/>
  <rect x="212" y="368" width="16" height="32" rx="4" fill="#ffffff" opacity="0.9"/>
  <rect x="248" y="368" width="16" height="32" rx="4" fill="#ffffff" opacity="0.9"/>
  <rect x="284" y="368" width="16" height="32" rx="4" fill="#ffffff" opacity="0.9"/>
  <rect x="316" y="368" width="16" height="32" rx="4" fill="#ffffff" opacity="0.9"/>
  <!-- CPU pins - left -->
  <rect x="112" y="180" width="32" height="16" rx="4" fill="#ffffff" opacity="0.9"/>
  <rect x="112" y="212" width="32" height="16" rx="4" fill="#ffffff" opacity="0.9"/>
  <rect x="112" y="248" width="32" height="16" rx="4" fill="#ffffff" opacity="0.9"/>
  <rect x="112" y="284" width="32" height="16" rx="4" fill="#ffffff" opacity="0.9"/>
  <rect x="112" y="316" width="32" height="16" rx="4" fill="#ffffff" opacity="0.9"/>
  <!-- CPU pins - right -->
  <rect x="368" y="180" width="32" height="16" rx="4" fill="#ffffff" opacity="0.9"/>
  <rect x="368" y="212" width="32" height="16" rx="4" fill="#ffffff" opacity="0.9"/>
  <rect x="368" y="248" width="32" height="16" rx="4" fill="#ffffff" opacity="0.9"/>
  <rect x="368" y="284" width="32" height="16" rx="4" fill="#ffffff" opacity="0.9"/>
  <rect x="368" y="316" width="32" height="16" rx="4" fill="#ffffff" opacity="0.9"/>
</svg>
